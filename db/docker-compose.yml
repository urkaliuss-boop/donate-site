version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: scp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mysecretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-scp_store}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Скрипт в папке init автоматически выполнится при первом запуске базы
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-admin} -d $${POSTGRES_DB:-scp_store}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
